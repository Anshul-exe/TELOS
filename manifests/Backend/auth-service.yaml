apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: telos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: telos
data:
  PORT: "4000"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: telos
type: Opaque
stringData:
  # Real connection string injected before apply.
  PG_CONN_STR: "postgresql://telos:telos@postgres:5432/auth"
  JWT_SECRET: "<PLACEHOLDER_JWT_SECRET>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: telos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: "632377784699.dkr.ecr.ap-south-1.amazonaws.com/telos-auth-service:latest"
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: telos
spec:
  selector:
    app: auth-service
  ports:
    - port: 4000
      targetPort: 4000
