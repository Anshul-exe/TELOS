apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: telos
  annotations:
    # Real value is injected via CI/CD before apply
    eks.amazonaws.com/role-arn: "${NOTIFICATION_SERVICE_IRSA_ARN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: telos
data:
  PORT: "4500"
  SQS_QUEUE_URL: "${SQS_QUEUE_URL}"
  MONGO_DB_NAME: "notifications"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: telos
type: Opaque
stringData:
  # Real connection string injected before apply.
  MONGO_CONN_STR: "mongodb://mongodb-svc:27017"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: telos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service
      containers:
        - name: notification-service
          image: "632377784699.dkr.ecr.ap-south-1.amazonaws.com/telos-notification-service:latest"
          ports:
            - containerPort: 4500
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: telos
spec:
  selector:
    app: notification-service
  ports:
    - port: 4500
      targetPort: 4500
