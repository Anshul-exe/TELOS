apiVersion: v2
name: telos
description: >-
  TELOS umbrella chart — the full Phase 2 microservice stack (auth-service,
  task-service, notification-service, frontend) plus in-cluster databases
  (MongoDB, Postgres). Replaces the plain manifests + envsubst workflow.
  Persistence intentionally kept on hostPath PVs (unchanged from Phase 2).
