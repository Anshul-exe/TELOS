{{- if .Values.database.postgres.enabled }}
{{- $ns := include "telos.namespace" . }}
{{- $pg := .Values.database.postgres }}
---
# hostPath PV — persistence strategy UNCHANGED from Phase 2. NOTE: the original
# manifests/Database/postgres.yaml PVC did NOT set storageClassName:"" and thus
# would bind dynamically; the postgres-pv.yaml hostPath PV was effectively
# orphaned. Here the claim is pinned to the static hostPath PV (storageClassName
# "") so the intended hostPath volume is actually used.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  labels:
{{ include "telos.labels" . | indent 4 }}
spec:
  capacity:
    storage: {{ $pg.persistence.size }}
  volumeMode: Filesystem
  # Pin this PV to its PVC so the two identical hostPath PVs bind
  # deterministically (they are otherwise interchangeable by size).
  claimRef:
    name: postgres-volume-claim
    namespace: {{ $ns }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ $pg.persistence.hostPath }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-volume-claim
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: {{ $pg.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ $pg.image }}
          ports:
            - containerPort: {{ $pg.port }}
          env:
            - name: POSTGRES_USER
              value: {{ $pg.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ $pg.password | quote }}
            - name: POSTGRES_DB
              value: {{ $pg.db | quote }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
{{ toYaml $pg.resources | indent 12 }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-volume-claim
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
spec:
  selector:
    app: postgres
  ports:
    - port: {{ $pg.port }}
      targetPort: {{ $pg.port }}
{{- end }}
