{{- if .Values.authService.enabled }}
{{- $ns := include "telos.namespace" . }}
{{- $svc := .Values.authService }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
    app: auth-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
data:
  PORT: {{ $svc.port | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
type: Opaque
stringData:
  PG_CONN_STR: {{ $svc.pgConnStr | quote }}
  JWT_SECRET: {{ .Values.secrets.auth.jwtSecret | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
    app: auth-service
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: {{ include "telos.image" (dict "root" $ "image" $svc.image) | quote }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          resources:
{{ toYaml $svc.resources | indent 12 }}
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ $ns }}
  labels:
{{ include "telos.labels" . | indent 4 }}
spec:
  selector:
    app: auth-service
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
